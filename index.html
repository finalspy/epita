<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destinations Internationales</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3347;
    --text: #e4e6f0;
    --text-dim: #8b90a8;
    --accent: #6c8cff;
    --accent2: #a78bfa;
    --exchange: #34d399;
    --paid: #fb923c;
    --closed: #ef4444;
    --erasmus: #38bdf8;
    --dd: #f472b6;
    --summer: #facc15;
    --radius: 8px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%);
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .filters {
    padding: 1rem 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: .75rem;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: .25rem;
  }

  .filter-group label {
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-dim);
    font-weight: 600;
  }

  select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .45rem .8rem;
    font-size: .85rem;
    font-family: var(--font);
    cursor: pointer;
    min-width: 160px;
    appearance: auto;
  }

  select:focus { outline: 1px solid var(--accent); border-color: var(--accent); }

  .stats {
    margin-left: auto;
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }

  .stat {
    text-align: center;
  }

  .stat-val {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: .65rem;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: .06em;
  }

  .legend {
    padding: .75rem 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    font-size: .75rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: .35rem;
    color: var(--text-dim);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  main {
    padding: 1.5rem 2rem;
  }

  .continent-section {
    margin-bottom: 2rem;
  }

  .continent-header {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent2);
    padding: .5rem 0;
    border-bottom: 2px solid var(--accent2);
    margin-bottom: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .continent-count {
    font-size: .75rem;
    color: var(--text-dim);
    font-weight: 400;
  }

  .country-section {
    margin-bottom: 1.25rem;
  }

  .country-name {
    font-size: .85rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: .5rem;
    padding-left: .5rem;
    border-left: 3px solid var(--border);
  }

  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .8rem;
    table-layout: fixed;
  }

  table .col-uni { width: 40%; }
  table .col-period { width: 12%; }

  thead th {
    background: var(--surface2);
    padding: .5rem .6rem;
    text-align: left;
    font-weight: 600;
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--text-dim);
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  tbody td {
    padding: .45rem .6rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  tbody tr:hover { background: var(--surface2); }

  .uni-name {
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cell-badge {
    display: inline-block;
    padding: .15rem .55rem;
    border-radius: 99px;
    font-size: .7rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .badge-echange { background: rgba(52,211,153,.15); color: var(--exchange); }
  .badge-payant { background: rgba(251,146,60,.15); color: var(--paid); }
  .badge-ferme { background: rgba(239,68,68,.12); color: var(--closed); text-decoration: line-through; }
  .badge-erasmus { background: rgba(56,189,248,.15); color: var(--erasmus); }
  .badge-dd { background: rgba(244,114,182,.15); color: var(--dd); }
  .badge-summer { background: rgba(250,204,21,.15); color: var(--summer); }
  .badge-mixed { background: rgba(108,140,255,.12); color: var(--accent); }

  .empty-cell { color: var(--border); }

  .no-results {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-size: 1rem;
  }

  @media (max-width: 768px) {
    header, .filters, .legend, main { padding-left: 1rem; padding-right: 1rem; }
    .filters { flex-direction: column; align-items: stretch; }
    .stats { margin-left: 0; justify-content: flex-start; }
    select { min-width: 100%; }
  }
</style>
</head>

<header>
  <h1>🌍 Destinations Internationales — Programmes d'échange</h1>
</header>

<div class="filters" id="filters">
  <div class="filter-group">
    <label>Continent</label>
    <select id="fContinent"><option value="">Tous</option></select>
  </div>
  <div class="filter-group">
    <label>Pays</label>
    <select id="fCountry"><option value="">Tous</option></select>
  </div>
  <div class="filter-group">
    <label>Période</label>
    <select id="fPeriod">
      <option value="">Toutes</option>
      <option value="s4">S4</option>
      <option value="s9">S9</option>
      <option value="bachelor">Bachelor Cyber</option>
      <option value="dd">Double diplôme</option>
      <option value="summer">Summer program</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Type</label>
    <select id="fType">
      <option value="">Tous</option>
      <option value="echange">Échange</option>
      <option value="erasmus">Erasmus</option>
      <option value="payant">Payant</option>
      <option value="ferme">Fermé</option>
    </select>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="statUni">0</div><div class="stat-label">Universités</div></div>
    <div class="stat"><div class="stat-val" id="statCountry">0</div><div class="stat-label">Pays</div></div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="background:var(--exchange)"></span> Échange</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--erasmus)"></span> Erasmus</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--paid)"></span> Payant</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--closed)"></span> Fermé</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--dd)"></span> Double diplôme</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--summer)"></span> Summer</div>
</div>

<main id="main"></main>

const PERIODS = ['s4','s9','bachelor','dd','summer'];
const PERIOD_LABELS = {s4:'S4',s9:'S9',bachelor:'Bachelor Cyber',dd:'Double diplôme',summer:'Summer'};

function classify(val) {
  if (!val) return null;
  const v = val.toLowerCase();
  if (v.includes('fermé')) return 'ferme';
  if (v.includes('erasmus') && v.includes('payant')) return 'mixed';
  if (v.includes('échange') && v.includes('payant')) return 'mixed';
  if (v.includes('erasmus')) return 'erasmus';
  if (v.includes('échange')) return 'echange';
  if (v.includes('payant')) return 'payant';
  if (v.includes('gratuit')) return 'echange';
  return 'echange';
}

function badge(val) {
  if (!val) return '<span class="empty-cell">—</span>';
  const cls = classify(val);
  const bcls = cls === 'echange' ? 'badge-echange' : cls === 'erasmus' ? 'badge-erasmus' : cls === 'payant' ? 'badge-payant' : cls === 'ferme' ? 'badge-ferme' : 'badge-mixed';
  return `<span class="cell-badge ${bcls}">${val}</span>`;
}

function populateFilters() {
  const continents = [...new Set(DATA.map(d=>d.c))].sort();
  const sel = document.getElementById('fContinent');
  continents.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
  updateCountryFilter();
}

function updateCountryFilter() {
  const fc = document.getElementById('fContinent').value;
  const countries = [...new Set(DATA.filter(d=> !fc || d.c===fc).map(d=>d.p))].sort();
  const sel = document.getElementById('fCountry');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Tous</option>';
  countries.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
  if (countries.includes(cur)) sel.value = cur;
}

function matchesType(val, type) {
  if (!type) return true;
  if (!val) return false;
  const v = val.toLowerCase();
  if (type === 'echange') return v.includes('échange');
  if (type === 'erasmus') return v.includes('erasmus');
  if (type === 'payant') return v.includes('payant');
  if (type === 'ferme') return v.includes('fermé');
  return false;
}

function filter() {
  const fc = document.getElementById('fContinent').value;
  const fp = document.getElementById('fCountry').value;
  const fperiod = document.getElementById('fPeriod').value;
  const ftype = document.getElementById('fType').value;

  return DATA.filter(d => {
    if (fc && d.c !== fc) return false;
    if (fp && d.p !== fp) return false;
    if (fperiod || ftype) {
      const periods = fperiod ? [fperiod] : PERIODS;
      const hasMatch = periods.some(p => {
        const val = d[p];
        if (!val) return false;
        if (ftype && !matchesType(val, ftype)) return false;
        return true;
      });
      if (!hasMatch) return false;
    }
    return true;
  });
}

function render() {
  const data = filter();
  const main = document.getElementById('main');

  document.getElementById('statUni').textContent = data.length;
  document.getElementById('statCountry').textContent = new Set(data.map(d=>d.p)).size;

  if (!data.length) { main.innerHTML = '<div class="no-results">Aucun résultat pour ces filtres.</div>'; return; }

  const grouped = {};
  data.forEach(d => {
    if (!grouped[d.c]) grouped[d.c] = {};
    if (!grouped[d.c][d.p]) grouped[d.c][d.p] = [];
    grouped[d.c][d.p].push(d);
  });

  const fperiod = document.getElementById('fPeriod').value;
  const visiblePeriods = fperiod ? [fperiod] : PERIODS;

  let html = '';
  const continentOrder = ['AFRIQUE','AMÉRIQUES','ASIE','EUROPE','MOYEN-ORIENT','OCÉANIE'];
  continentOrder.forEach(cont => {
    if (!grouped[cont]) return;
    const countries = Object.keys(grouped[cont]).sort();
    const total = countries.reduce((s,c) => s + grouped[cont][c].length, 0);
    html += `<div class="continent-section">`;
    html += `<div class="continent-header"><span>${cont}</span><span class="continent-count">${total} univ.</span></div>`;
    countries.forEach(country => {
      const unis = grouped[cont][country];
      html += `<div class="country-section">`;
      html += `<div class="country-name">${country}</div>`;
      const pctPeriod = Math.floor(60 / visiblePeriods.length);
      html += `<div class="table-wrap"><table><colgroup><col style="width:${100 - pctPeriod * visiblePeriods.length}%">`;
      visiblePeriods.forEach(() => html += `<col style="width:${pctPeriod}%">`);
      html += `</colgroup><thead><tr><th>Université</th>`;
      visiblePeriods.forEach(p => html += `<th>${PERIOD_LABELS[p]}</th>`);
      html += `</tr></thead><tbody>`;
      unis.forEach(u => {
        html += `<tr><td class="uni-name" title="${u.u}">${u.u}</td>`;
        visiblePeriods.forEach(p => html += `<td>${badge(u[p])}</td>`);
        html += `</tr>`;
      });
      html += `</tbody></table></div></div>`;
    });
    html += `</div>`;
  });
  main.innerHTML = html;
}

document.getElementById('fContinent').addEventListener('change', () => { updateCountryFilter(); render(); });
document.getElementById('fCountry').addEventListener('change', render);
document.getElementById('fPeriod').addEventListener('change', render);
document.getElementById('fType').addEventListener('change', render);

populateFilters();
render();
</script>
