<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destinations Internationales</title>
<script>
  try {
    var savedTheme = localStorage.getItem('destinations-theme-v1');
    if (savedTheme === 'light' || savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', savedTheme);
    }
  } catch (error) {}
</script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3347;
    --text: #e4e6f0;
    --text-dim: #8b90a8;
    --accent: #6c8cff;
    --accent2: #a78bfa;
    --exchange: #34d399;
    --paid: #fb923c;
    --closed: #ef4444;
    --erasmus: #38bdf8;
    --dd: #f472b6;
    --summer: #facc15;
    --favorite-on: #facc15;
    --favorite-off: #6b7280;
    --radius: 8px;
    --font: 'Segoe UI', system-ui, sans-serif;
    --sticky-offset: 0px;
    --toolbar-bg: rgba(26, 29, 39, .94);
    --panel-shadow: 0 18px 40px rgba(0,0,0,.35);
    --soft-border: rgba(46, 51, 71, .75);
    --hover-soft: rgba(255,255,255,.04);
    --hover-subtle: rgba(255,255,255,.03);
    --switch-knob: #f8fafc;
    --switch-accent-bg: rgba(250, 204, 21, .18);
    --section-bg: rgba(26, 29, 39, .65);
    --country-border: rgba(46, 51, 71, .65);
    --country-bg: rgba(15, 17, 23, .28);
    --accent-border: rgba(167,139,250,.22);
  }

  :root[data-theme="light"] {
    --bg: #f4f7fc;
    --surface: #ffffff;
    --surface2: #eef3fb;
    --border: #d8e1ef;
    --text: #172033;
    --text-dim: #67748e;
    --accent: #2e5bff;
    --accent2: #7c4dff;
    --favorite-off: #94a3b8;
    --toolbar-bg: rgba(255, 255, 255, .94);
    --panel-shadow: 0 16px 36px rgba(23, 32, 51, .12);
    --soft-border: rgba(135, 148, 177, .35);
    --hover-soft: rgba(46, 91, 255, .07);
    --hover-subtle: rgba(46, 91, 255, .05);
    --switch-knob: #ffffff;
    --switch-accent-bg: rgba(250, 204, 21, .24);
    --section-bg: rgba(255, 255, 255, .92);
    --country-border: rgba(135, 148, 177, .35);
    --country-bg: rgba(244, 247, 252, .95);
    --accent-border: rgba(124, 77, 255, .16);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    transition: background-color .2s ease, color .2s ease;
  }

  header {
    padding: 1.2rem 1.25rem .75rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%);
  }

  header h1 {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .toolbar {
    position: sticky;
    top: 0;
    z-index: 120;
    border-bottom: 1px solid var(--border);
    background: var(--toolbar-bg);
    backdrop-filter: blur(14px);
    overflow: visible;
  }

  .toolbar-bar {
    padding: .55rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .75rem;
  }

  .toolbar-title {
    font-size: .72rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-dim);
    font-weight: 700;
  }

  .toolbar-actions {
    display: flex;
    align-items: center;
    gap: .55rem;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .toolbar-btn {
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    border-radius: 999px;
    padding: .35rem .78rem;
    font: inherit;
    font-size: .75rem;
    font-weight: 600;
  }

  .toolbar-btn:hover {
    border-color: var(--accent);
  }

  .theme-toggle {
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    color: var(--text-dim);
    font-size: .74rem;
    font-weight: 600;
    letter-spacing: .03em;
    cursor: pointer;
  }

  .theme-toggle input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .theme-switch {
    position: relative;
    width: 42px;
    height: 24px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface2);
    flex-shrink: 0;
    transition: background .18s ease, border-color .18s ease;
  }

  .theme-switch::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--switch-knob);
    transition: transform .18s ease;
  }

  .theme-toggle input:checked + .theme-switch {
    border-color: var(--accent);
    background: rgba(46, 91, 255, .18);
  }

  .theme-toggle input:checked + .theme-switch::after {
    transform: translateX(18px);
  }

  .theme-toggle-label {
    color: var(--text);
  }

  .toolbar-panel {
    overflow: visible;
    max-height: 1200px;
    transition: max-height .25s ease, opacity .2s ease;
    opacity: 1;
  }

  .toolbar.collapsed .toolbar-panel {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
  }

  .filters {
    padding: .75rem 1.25rem;
    display: grid;
    grid-template-columns: minmax(220px, 320px) repeat(4, minmax(130px, 1fr)) minmax(170px, 220px) auto;
    gap: .65rem;
    align-items: end;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: .4rem;
    min-width: 0;
  }

  .filter-group--search {
    grid-column: span 1;
  }

  .filter-group--favorites {
    justify-self: end;
    min-width: 170px;
  }

  .filter-group label {
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-dim);
    font-weight: 600;
  }

  .control-input,
  .filter-menu-summary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .58rem .72rem;
    font-size: .8rem;
    font-family: var(--font);
    min-height: 38px;
  }

  .control-input {
    width: 100%;
  }

  .control-input::placeholder {
    color: var(--text-dim);
  }

  .control-input:focus,
  .filter-menu-summary:focus {
    outline: 1px solid var(--accent);
    border-color: var(--accent);
  }

  .filter-menu {
    position: relative;
  }

  .filter-menu[open] {
    z-index: 160;
  }

  .filter-menu-summary {
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .75rem;
    user-select: none;
  }

  .filter-menu-summary::-webkit-details-marker {
    display: none;
  }

  .filter-menu-summary::after {
    content: '▾';
    color: var(--text-dim);
    font-size: .78rem;
    transition: transform .18s ease;
  }

  .filter-menu[open] .filter-menu-summary::after {
    transform: rotate(180deg);
  }

  .filter-menu-panel {
    position: absolute;
    top: calc(100% + .35rem);
    left: 0;
    z-index: 170;
    width: min(320px, max(100%, 220px));
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: .55rem;
    box-shadow: var(--panel-shadow);
  }

  .filter-menu-actions {
    display: flex;
    justify-content: flex-end;
    gap: .5rem;
    padding-bottom: .5rem;
    margin-bottom: .45rem;
    border-bottom: 1px solid var(--soft-border);
  }

  .filter-mini-btn {
    cursor: pointer;
    border: 0;
    background: transparent;
    color: var(--accent);
    font: inherit;
    font-size: .75rem;
    font-weight: 600;
  }

  .filter-options {
    display: flex;
    flex-direction: column;
    gap: .2rem;
    max-height: 240px;
    overflow: auto;
  }

  .filter-option {
    display: flex;
    align-items: center;
    gap: .65rem;
    padding: .45rem .5rem;
    border-radius: 10px;
    color: var(--text);
  }

  .filter-option:hover {
    background: var(--hover-soft);
  }

  .filter-option input {
    accent-color: var(--accent);
    flex-shrink: 0;
  }

  .filter-option-text {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .75rem;
    width: 100%;
    min-width: 0;
  }

  .filter-option-label {
    min-width: 0;
  }

  .filter-option-count {
    color: var(--text-dim);
    font-size: .72rem;
    flex-shrink: 0;
  }

  .favorite-toggle {
    position: relative;
    cursor: pointer;
    min-height: 38px;
    display: flex;
    align-items: center;
    gap: .55rem;
    padding: .1rem 0;
    color: var(--text);
  }

  .filter-group--favorites .favorite-toggle {
    justify-content: flex-end;
  }

  .favorite-toggle input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .favorite-switch {
    position: relative;
    width: 48px;
    height: 28px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface2);
    transition: background .18s ease, border-color .18s ease;
    flex-shrink: 0;
  }

  .favorite-switch::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--switch-knob);
    transition: transform .18s ease;
  }

  .favorite-toggle input:checked + .favorite-switch {
    background: var(--switch-accent-bg);
    border-color: var(--favorite-on);
  }

  .favorite-toggle input:checked + .favorite-switch::after {
    transform: translateX(20px);
  }

  .favorite-label {
    color: var(--text);
    font-size: .8rem;
    white-space: nowrap;
  }

  .stats {
    display: flex;
    justify-content: flex-end;
    gap: .9rem;
    align-items: flex-end;
    min-height: 38px;
    padding-top: 0;
    margin-left: 0;
    align-self: end;
  }

  .stat {
    text-align: center;
  }

  .stat-val {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: .65rem;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: .06em;
  }

  .legend {
    padding: .5rem 1.25rem;
    display: flex;
    flex-wrap: wrap;
    gap: .8rem;
    font-size: .7rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .active-filters {
    padding: .55rem 1.25rem .1rem;
    display: flex;
    align-items: center;
    gap: .45rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .active-filters[hidden] {
    display: none;
  }

  .active-filters-label {
    font-size: .68rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-dim);
    font-weight: 700;
    margin-right: .1rem;
  }

  .filter-chip {
    display: inline-flex;
    align-items: center;
    gap: .45rem;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface2);
    color: var(--text);
    padding: .28rem .38rem .28rem .62rem;
    font-size: .74rem;
    line-height: 1;
  }

  .filter-chip-remove {
    cursor: pointer;
    border: 0;
    background: transparent;
    color: var(--text-dim);
    font: inherit;
    font-size: .9rem;
    line-height: 1;
    padding: 0;
  }

  .filter-chip-remove:hover {
    color: var(--text);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: .35rem;
    color: var(--text-dim);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  .legend-star {
    font-size: .95rem;
    line-height: 1;
    color: var(--favorite-on);
  }

  main {
    padding: .9rem 1.25rem 1.25rem;
  }

  .continent-section {
    margin-bottom: 1rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--section-bg);
    overflow: hidden;
  }

  .continent-header {
    cursor: pointer;
    width: 100%;
    border: 0;
    background: transparent;
    text-align: left;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent2);
    padding: .78rem .95rem;
    border-bottom: 1px solid var(--accent-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }

  .continent-header:hover,
  .country-toggle:hover {
    background: var(--hover-subtle);
  }

  .continent-title {
    display: flex;
    align-items: center;
    gap: .8rem;
  }

  .continent-chevron {
    font-size: .9rem;
    transition: transform .2s ease;
  }

  .continent-section.is-collapsed .continent-chevron,
  .country-section.is-collapsed .country-chevron {
    transform: rotate(0deg);
  }

  .continent-section:not(.is-collapsed) .continent-chevron,
  .country-section:not(.is-collapsed) .country-chevron {
    transform: rotate(90deg);
  }

  .continent-count {
    font-size: .75rem;
    color: var(--text-dim);
    font-weight: 400;
  }

  .continent-body {
    padding: .75rem .95rem .95rem;
  }

  .continent-body.is-collapsed,
  .country-body.is-collapsed {
    display: none;
  }

  .country-section {
    margin-bottom: .75rem;
    border: 1px solid var(--country-border);
    border-radius: 12px;
    background: var(--country-bg);
    overflow: hidden;
  }

  .country-section:not(.is-collapsed) > .country-toggle {
    display: none;
  }

  .country-toggle {
    cursor: pointer;
    width: 100%;
    border: 0;
    background: transparent;
    padding: .62rem .8rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    text-align: left;
    color: inherit;
    font: inherit;
  }

  .country-title {
    display: flex;
    align-items: center;
    gap: .65rem;
    min-width: 0;
  }

  .country-chevron {
    font-size: .8rem;
    color: var(--text-dim);
    transition: transform .2s ease;
  }

  .country-name {
    font-size: .85rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .06em;
    min-width: 0;
  }

  .country-count {
    flex-shrink: 0;
    font-size: .72rem;
    color: var(--text-dim);
  }

  .country-body {
    padding: .8rem;
  }

  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .76rem;
    table-layout: fixed;
  }

  table .col-uni { width: 40%; }
  table .col-period { width: 12%; }

  thead th {
    background: var(--surface2);
    padding: .42rem .52rem;
    text-align: left;
    font-weight: 600;
    font-size: .62rem;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--text-dim);
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .country-head-row {
    cursor: pointer;
  }

  .country-head-row:hover th {
    background: var(--surface);
  }

  .country-head-row:focus {
    outline: 1px solid var(--accent);
    outline-offset: -1px;
  }

  .country-head-cell {
    display: flex;
    align-items: center;
    gap: .55rem;
    min-width: 0;
  }

  .country-head-chevron {
    font-size: .78rem;
    color: var(--text-dim);
    transition: transform .2s ease;
    flex-shrink: 0;
  }

  .country-head-row .country-head-chevron {
    transform: rotate(90deg);
  }

  .country-head-name {
    color: var(--text);
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .country-head-meta {
    color: var(--text-dim);
    font-size: .58rem;
    font-weight: 500;
    letter-spacing: .04em;
    text-transform: none;
  }

  tbody td {
    padding: .38rem .52rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  tbody tr:hover { background: var(--surface2); }

  tbody tr:last-child td {
    border-bottom: 0;
  }

  .uni-name {
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .uni-cell {
    display: flex;
    align-items: center;
    gap: .55rem;
    min-width: 0;
  }

  .favorite-btn {
    cursor: pointer;
    border: 0;
    background: transparent;
    color: var(--favorite-off);
    font-size: .92rem;
    line-height: 1;
    padding: 0;
    flex-shrink: 0;
  }

  .favorite-btn.is-favorite {
    color: var(--favorite-on);
  }

  .cell-badge {
    display: inline-block;
    padding: .12rem .48rem;
    border-radius: 99px;
    font-size: .62rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .badge-echange { background: rgba(52,211,153,.15); color: var(--exchange); }
  .badge-payant { background: rgba(251,146,60,.15); color: var(--paid); }
  .badge-ferme { background: rgba(239,68,68,.12); color: var(--closed); text-decoration: line-through; }
  .badge-erasmus { background: rgba(56,189,248,.15); color: var(--erasmus); }
  .badge-dd { background: rgba(244,114,182,.15); color: var(--dd); }
  .badge-summer { background: rgba(250,204,21,.15); color: var(--summer); }
  .badge-mixed { background: rgba(108,140,255,.12); color: var(--accent); }

  .empty-cell { color: var(--border); }

  .no-results {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-size: 1rem;
  }

  @media (max-width: 1360px) {
    .filters {
      grid-template-columns: repeat(4, minmax(150px, 1fr));
    }
    .filter-group--search {
      grid-column: span 2;
    }
    .filter-group--favorites {
      justify-self: start;
    }
    .filter-group--favorites .favorite-toggle {
      justify-content: flex-start;
    }
    .stats {
      justify-content: flex-start;
    }
  }

  @media (max-width: 768px) {
    header, .filters, .legend, main, .toolbar-bar { padding-left: 1rem; padding-right: 1rem; }
    header {
      padding-top: 1rem;
      padding-bottom: .65rem;
    }
    header h1 {
      font-size: 1.1rem;
      line-height: 1.25;
    }
    .toolbar-bar {
      flex-direction: column;
      align-items: stretch;
      gap: .45rem;
    }
    .toolbar-actions {
      width: 100%;
      justify-content: flex-start;
    }
    .filters {
      grid-template-columns: 1fr;
      gap: .55rem;
    }
    .filter-group--search {
      grid-column: span 1;
    }
    .filter-menu {
      width: 100%;
    }
    .filter-menu-panel {
      position: static;
      width: 100%;
      margin-top: .35rem;
      box-shadow: none;
    }
    .theme-toggle {
      order: -1;
    }
    .filter-group--favorites {
      justify-self: stretch;
      min-width: 0;
    }
    .filter-group--favorites .favorite-toggle {
      justify-content: flex-start;
    }
    .stats {
      justify-content: flex-start;
      padding-top: 0;
      gap: .8rem;
    }
    .stat-val {
      font-size: 1.05rem;
    }
    .legend {
      gap: .55rem;
    }
    .active-filters {
      padding-left: 1rem;
      padding-right: 1rem;
    }
    .continent-header,
    .country-toggle {
      padding-left: .72rem;
      padding-right: .72rem;
    }
    .continent-body,
    .country-body {
      padding-left: .72rem;
      padding-right: .72rem;
    }
  }
</style>
</head>
<body>

<header>
  <h1>🌍 Destinations Internationales — Programmes d'échange</h1>
</header>

<div class="toolbar" id="toolbar">
  <div class="toolbar-bar">
    <div class="toolbar-title">Filtres et légende</div>
    <div class="toolbar-actions">
      <label class="theme-toggle">
        <input id="themeToggle" type="checkbox">
        <span class="theme-switch" aria-hidden="true"></span>
        <span class="theme-toggle-label" id="themeLabel">Sombre</span>
      </label>
      <button class="toolbar-btn" id="resetFilters" type="button">Reset</button>
      <button class="toolbar-btn" id="toolbarToggle" type="button" aria-expanded="true" aria-controls="toolbarPanel">Masquer</button>
    </div>
  </div>
  <div class="toolbar-panel" id="toolbarPanel">
    <div class="filters" id="filters">
      <div class="filter-group filter-group--search">
        <label for="fSearch">Recherche</label>

  periods: { summaryId: 'labelPeriod', optionsId: 'optionsPeriod', emptyLabel: 'Toutes', getOptions: () => PERIOD_OPTIONS },
  types: { summaryId: 'labelType', optionsId: 'optionsType', emptyLabel: 'Tous', getOptions: () => TYPE_OPTIONS },
};
const uiState = {
  filters: loadFilters(),
  continentOpen: loadSectionState('continents'),
  countryOpen: loadSectionState('countries'),
  favorites: loadFavorites(),
  theme: document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark',
};

DATA.forEach(item => {
  item.searchIndex = buildSearchIndex(item);
});

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function normalizeText(value) {
  let text = value == null ? '' : String(value);
  if (typeof text.normalize === 'function') {
    text = text.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }
  return text.toLowerCase();
}

function forEachNode(list, callback) {
  Array.prototype.forEach.call(list, callback);
}

function matchesSelector(element, selector) {
  if (!element || element.nodeType !== 1) return false;
  const matcher =
    element.matches ||
    element.msMatchesSelector ||
    element.webkitMatchesSelector ||
    element.mozMatchesSelector;
  return matcher ? matcher.call(element, selector) : false;
}

function closestSelector(element, selector) {
  let current = element;
  while (current && current !== document) {
    if (matchesSelector(current, selector)) return current;
    current = current.parentElement;
  }
  return null;
}

function buildSearchIndex(item) {
  const parts = [item.c, item.p, item.u];
  PERIOD_OPTIONS.forEach(option => {
    if (!item[option.value]) return;
    parts.push(option.label, item[option.value]);
  });
  return normalizeText(parts.join(' '));
}

function setFromArray(value) {
  return new Set(Array.isArray(value) ? value.map(String) : []);
}

function createEmptyFilters() {
  return {
    continents: new Set(),
    countries: new Set(),
    periods: new Set(),
    types: new Set(),
    search: '',
    favoritesOnly: false,
  };
}

function hasUrlFilterState(params) {
  return ['continent', 'country', 'period', 'type', 'q', 'favorites'].some(key => params.has(key));
}

function loadFiltersFromUrl() {
  const empty = createEmptyFilters();

  try {
    const params = new URLSearchParams(window.location.search || '');
    if (!hasUrlFilterState(params)) return null;

    empty.continents = setFromArray(params.getAll('continent'));
    empty.countries = setFromArray(params.getAll('country'));
    empty.periods = setFromArray(params.getAll('period'));
    empty.types = setFromArray(params.getAll('type'));
    empty.search = params.get('q') || '';
    empty.favoritesOnly = ['1', 'true', 'yes'].includes(String(params.get('favorites') || '').toLowerCase());
    return empty;
  } catch {
    return null;
  }
}

function loadFilters() {
  const fromUrl = loadFiltersFromUrl();
  if (fromUrl) return fromUrl;

  try {
    const raw = localStorage.getItem(FILTERS_STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    return {
      continents: setFromArray(parsed.continents),
      countries: setFromArray(parsed.countries),
      periods: setFromArray(parsed.periods),
      types: setFromArray(parsed.types),
      search: typeof parsed.search === 'string' ? parsed.search : '',
      favoritesOnly: Boolean(parsed.favoritesOnly),
    };
  } catch {
    return createEmptyFilters();
  }
}

function syncFiltersToUrl() {
  try {
    const params = new URLSearchParams();

    [...uiState.filters.continents].sort().forEach(value => params.append('continent', value));
    [...uiState.filters.countries].sort().forEach(value => params.append('country', value));
    [...uiState.filters.periods].sort().forEach(value => params.append('period', value));
    [...uiState.filters.types].sort().forEach(value => params.append('type', value));

    if (uiState.filters.search.trim()) params.set('q', uiState.filters.search.trim());
    if (uiState.filters.favoritesOnly) params.set('favorites', '1');

    const query = params.toString();
    const nextUrl = `${window.location.pathname}${query ? `?${query}` : ''}${window.location.hash || ''}`;
    window.history.replaceState({}, '', nextUrl);
  } catch {
    // Ignore URL rewriting failures in restricted contexts.
  }
}

function saveFilters() {
  try {
    localStorage.setItem(FILTERS_STORAGE_KEY, JSON.stringify({
      continents: [...uiState.filters.continents],
      countries: [...uiState.filters.countries],
      periods: [...uiState.filters.periods],
      types: [...uiState.filters.types],
      search: uiState.filters.search,
      favoritesOnly: uiState.filters.favoritesOnly,
    }));
  } catch {
    // Ignore storage failures in file:// contexts or private sessions.
  }

  syncFiltersToUrl();
}

function loadFavorites() {
  try {
    const raw = localStorage.getItem(FAVORITES_STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return new Set(Array.isArray(parsed) ? parsed.map(String) : []);
  } catch {
    return new Set();
  }
}

function saveFavorites() {
  try {
    localStorage.setItem(FAVORITES_STORAGE_KEY, JSON.stringify([...uiState.favorites]));
  } catch {
    // Ignore storage failures in file:// contexts or private sessions.
  }
}

function loadSectionState(key) {
  try {
    const raw = localStorage.getItem(SECTION_STATE_STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    const sectionState = parsed && typeof parsed[key] === 'object' ? parsed[key] : {};
    const normalized = {};
    Object.keys(sectionState).forEach(sectionKey => {
      normalized[sectionKey] = sectionState[sectionKey] !== false ? true : false;
    });
    return normalized;
  } catch {
    return {};
  }
}

function saveSectionStates() {
  try {
    localStorage.setItem(SECTION_STATE_STORAGE_KEY, JSON.stringify({
      continents: uiState.continentOpen,
      countries: uiState.countryOpen,
    }));
  } catch {
    // Ignore storage failures in file:// contexts or private sessions.
  }
}

function applyTheme(theme) {
  const resolvedTheme = theme === 'light' ? 'light' : 'dark';
  uiState.theme = resolvedTheme;
  document.documentElement.setAttribute('data-theme', resolvedTheme);
  document.getElementById('themeToggle').checked = resolvedTheme === 'light';
  document.getElementById('themeLabel').textContent = resolvedTheme === 'light' ? 'Clair' : 'Sombre';
  try {
    localStorage.setItem(THEME_STORAGE_KEY, resolvedTheme);
  } catch {
    // Ignore storage failures in file:// contexts or private sessions.
  }
}

function isSectionOpen(store, key) {
  return store[key] !== false;
}

function toggleSection(store, key) {
  store[key] = !isSectionOpen(store, key);
  saveSectionStates();
}

function isFavorite(item) {
  return uiState.favorites.has(String(item.id));
}

function classify(val) {
  if (!val) return null;
  const v = val.toLowerCase();
  if (v.includes('fermé')) return 'ferme';
  if (v.includes('erasmus') && v.includes('payant')) return 'mixed';
  if (v.includes('échange') && v.includes('payant')) return 'mixed';
  if (v.includes('erasmus')) return 'erasmus';
  if (v.includes('échange')) return 'echange';
  if (v.includes('payant')) return 'payant';
  if (v.includes('gratuit')) return 'echange';
  return 'echange';
}

function badge(val) {
  if (!val) return '<span class="empty-cell">—</span>';
  const cls = classify(val);
  const bcls = cls === 'echange' ? 'badge-echange' : cls === 'erasmus' ? 'badge-erasmus' : cls === 'payant' ? 'badge-payant' : cls === 'ferme' ? 'badge-ferme' : 'badge-mixed';
  return `<span class="cell-badge ${bcls}">${escapeHtml(val)}</span>`;
}

function getAvailableCountries() {
  const source = uiState.filters.continents.size
    ? DATA.filter(item => uiState.filters.continents.has(item.c))
    : DATA;

  return [...new Set(source.map(item => item.p))].sort((a, b) => a.localeCompare(b, 'fr'));
}

function syncCountrySelection() {
  const availableCountries = new Set(getAvailableCountries());
  [...uiState.filters.countries].forEach(country => {
    if (!availableCountries.has(country)) uiState.filters.countries.delete(country);
  });
}

function summarizeSelection(filterKey, options) {
  const selected = [...uiState.filters[filterKey]];
  const config = FILTER_MENU_CONFIG[filterKey];
  if (!selected.length) return config.emptyLabel;

  const labelMap = new Map(options.map(option => [option.value, option.label]));
  const labels = selected.map(value => labelMap.get(value) || value);
  if (labels.length <= 2) return labels.join(', ');
  return `${labels.length} sélectionnés`;
}

function getOptionLabel(filterKey, value) {
  const options = FILTER_MENU_CONFIG[filterKey].getOptions();
  for (let index = 0; index < options.length; index += 1) {
    if (options[index].value === value) return options[index].label;
  }
  return value;
}

function renderActiveFilters() {
  const container = document.getElementById('activeFilters');
  const chips = [];

  if (uiState.filters.search.trim()) {
    chips.push(`
      <span class="filter-chip">
        <span>Recherche: ${escapeHtml(uiState.filters.search.trim())}</span>
        <button type="button" class="filter-chip-remove" data-action="remove-filter-chip" data-chip-kind="search" aria-label="Retirer le filtre de recherche">×</button>
      </span>
    `);
  }

  if (uiState.filters.favoritesOnly) {
    chips.push(`
      <span class="filter-chip">
        <span>Favoris uniquement</span>
        <button type="button" class="filter-chip-remove" data-action="remove-filter-chip" data-chip-kind="favorites" aria-label="Retirer le filtre favoris">×</button>
      </span>
    `);
  }

  ['continents', 'countries', 'periods', 'types'].forEach(filterKey => {
    [...uiState.filters[filterKey]].forEach(value => {
      chips.push(`
        <span class="filter-chip">
          <span>${escapeHtml(getOptionLabel(filterKey, value))}</span>
          <button type="button" class="filter-chip-remove" data-action="remove-filter-chip" data-chip-kind="set" data-filter="${filterKey}" data-value="${escapeHtml(value)}" aria-label="Retirer le filtre ${escapeHtml(getOptionLabel(filterKey, value))}">×</button>
        </span>
      `);
    });
  });

  if (!chips.length) {
    container.hidden = true;
    container.innerHTML = '';
    return;
  }

  container.hidden = false;
  container.innerHTML = `<span class="active-filters-label">Filtres actifs</span>${chips.join('')}`;
}

function renderFilterMenu(filterKey) {
  const config = FILTER_MENU_CONFIG[filterKey];
  const options = config.getOptions();
  const selected = uiState.filters[filterKey];
  const summary = document.getElementById(config.summaryId);
  const container = document.getElementById(config.optionsId);

  summary.textContent = summarizeSelection(filterKey, options);
  container.innerHTML = options.length
    ? options.map(option => `
        <label class="filter-option">
          <input type="checkbox" data-filter-option data-filter="${filterKey}" value="${escapeHtml(option.value)}"${selected.has(option.value) ? ' checked' : ''}>
          <span class="filter-option-text">
            <span class="filter-option-label">${escapeHtml(option.label)}</span>
            <span class="filter-option-count">${getFilterOptionCount(filterKey, option.value)}</span>
          </span>
        </label>
      `).join('')
    : '<div class="filter-option"><span>Aucune option disponible</span></div>';
}

function renderFilterControls() {
  syncCountrySelection();
  renderFilterMenu('continents');
  renderFilterMenu('countries');
  renderFilterMenu('periods');
  renderFilterMenu('types');
  document.getElementById('fSearch').value = uiState.filters.search;
  document.getElementById('fFavorites').checked = uiState.filters.favoritesOnly;
  renderActiveFilters();
  saveFilters();
}

function closeFilterMenus(exceptMenu = null) {
  forEachNode(document.querySelectorAll('.filter-menu[open]'), menu => {
    if (menu !== exceptMenu) menu.open = false;
  });
}

function matchesType(val, type) {
  if (!type) return true;
  if (!val) return false;
  const v = val.toLowerCase();
  if (type === 'echange') return v.includes('échange');
  if (type === 'erasmus') return v.includes('erasmus');
  if (type === 'payant') return v.includes('payant');
  if (type === 'ferme') return v.includes('fermé');
  return false;
}

function matchesSelectedTypes(val) {
  if (!uiState.filters.types.size) return true;
  return [...uiState.filters.types].some(type => matchesType(val, type));
}

function getVisiblePeriods() {
  return uiState.filters.periods.size
    ? PERIOD_OPTIONS.filter(option => uiState.filters.periods.has(option.value)).map(option => option.value)
    : PERIOD_OPTIONS.map(option => option.value);
}

function matchesBaseFilters(item, ignoredFilterKey = '') {
  const searchTerm = normalizeText(uiState.filters.search.trim());

  if (ignoredFilterKey !== 'continents' && uiState.filters.continents.size && !uiState.filters.continents.has(item.c)) return false;
  if (ignoredFilterKey !== 'countries' && uiState.filters.countries.size && !uiState.filters.countries.has(item.p)) return false;
  if (ignoredFilterKey !== 'favorites' && uiState.filters.favoritesOnly && !isFavorite(item)) return false;
  if (ignoredFilterKey !== 'search' && searchTerm && !item.searchIndex.includes(searchTerm)) return false;
  return true;
}

function matchesPeriodAndTypeFilters(item, periods, types) {
  if (!periods.length && !types.length) return true;

  const periodsToCheck = periods.length
    ? periods
    : PERIOD_OPTIONS.map(option => option.value);

  return periodsToCheck.some(period => {
    const value = item[period];
    if (!value) return false;
    if (!types.length) return true;
    return types.some(type => matchesType(value, type));
  });
}

function filterData() {
  const selectedPeriods = [...uiState.filters.periods];
  const selectedTypes = [...uiState.filters.types];

  return DATA.filter(item =>
    matchesBaseFilters(item) &&
    matchesPeriodAndTypeFilters(item, selectedPeriods, selectedTypes)
  );
}

function getFilterOptionCount(filterKey, optionValue) {
  if (filterKey === 'continents') {
    return DATA.filter(item =>
      item.c === optionValue &&
      matchesBaseFilters(item, 'continents') &&
      matchesPeriodAndTypeFilters(item, [...uiState.filters.periods], [...uiState.filters.types])
    ).length;
  }

  if (filterKey === 'countries') {
    return DATA.filter(item =>
      item.p === optionValue &&
      matchesBaseFilters(item, 'countries') &&
      matchesPeriodAndTypeFilters(item, [...uiState.filters.periods], [...uiState.filters.types])
    ).length;
  }

  if (filterKey === 'periods') {
    return DATA.filter(item => {
      if (!matchesBaseFilters(item)) return false;
      const value = item[optionValue];
      if (!value) return false;
      if (!uiState.filters.types.size) return true;
      return [...uiState.filters.types].some(type => matchesType(value, type));
    }).length;
  }

  if (filterKey === 'types') {
    const periodsToCheck = uiState.filters.periods.size
      ? [...uiState.filters.periods]
      : PERIOD_OPTIONS.map(option => option.value);

    return DATA.filter(item =>
      matchesBaseFilters(item) &&
      periodsToCheck.some(period => matchesType(item[period], optionValue))
    ).length;
  }

  return 0;
}

function toggleToolbar(forceOpen) {
  const toolbar = document.getElementById('toolbar');
  const button = document.getElementById('toolbarToggle');
  const isOpen = typeof forceOpen === 'boolean' ? forceOpen : toolbar.classList.contains('collapsed');
  toolbar.classList.toggle('collapsed', !isOpen);
  button.textContent = isOpen ? 'Masquer' : 'Afficher';
  button.setAttribute('aria-expanded', String(isOpen));
  if (!isOpen) closeFilterMenus();
}

function toggleFavorite(id) {
  const key = String(id);
  if (uiState.favorites.has(key)) uiState.favorites.delete(key);
  else uiState.favorites.add(key);
  saveFavorites();
  render();
}

function resetFilters() {
  uiState.filters.continents.clear();
  uiState.filters.countries.clear();
  uiState.filters.periods.clear();
  uiState.filters.types.clear();
  uiState.filters.search = '';
  uiState.filters.favoritesOnly = false;
  renderFilterControls();
  render();
  closeFilterMenus();
}

function render() {
  const data = filterData();
  const main = document.getElementById('main');
  const visiblePeriods = getVisiblePeriods();

  document.getElementById('statUni').textContent = data.length;
  document.getElementById('statCountry').textContent = new Set(data.map(item => item.p)).size;

  if (!data.length) {
    const message = uiState.filters.favoritesOnly
      ? 'Aucun favori ne correspond à ces filtres.'
      : 'Aucun résultat pour ces filtres.';
    main.innerHTML = `<div class="no-results">${message}</div>`;
    return;
  }

  const grouped = {};
  data.forEach(item => {
    if (!grouped[item.c]) grouped[item.c] = {};
    if (!grouped[item.c][item.p]) grouped[item.c][item.p] = [];
    grouped[item.c][item.p].push(item);
  });

  let html = '';
  CONTINENT_ORDER.forEach(continent => {
    if (!grouped[continent]) return;

    const countries = Object.keys(grouped[continent]).sort((a, b) => a.localeCompare(b, 'fr'));
    const total = countries.reduce((sum, country) => sum + grouped[continent][country].length, 0);
    const continentOpen = isSectionOpen(uiState.continentOpen, continent);

    html += `<section class="continent-section${continentOpen ? '' : ' is-collapsed'}">`;
    html += `<button type="button" class="continent-header" data-action="toggle-continent" data-continent="${escapeHtml(continent)}" aria-expanded="${String(continentOpen)}">`;
    html += `<span class="continent-title"><span class="continent-chevron">▸</span><span>${escapeHtml(continent)}</span></span>`;
    html += `<span class="continent-count">${total} univ.</span>`;
    html += `</button>`;
    html += `<div class="continent-body${continentOpen ? '' : ' is-collapsed'}">`;

    countries.forEach(country => {
      const countryKey = `${continent}__${country}`;
      const universities = grouped[continent][country];
      const countryOpen = isSectionOpen(uiState.countryOpen, countryKey);
      const pctPeriod = Math.floor(60 / visiblePeriods.length);

      html += `<section class="country-section${countryOpen ? '' : ' is-collapsed'}">`;
      html += `<button type="button" class="country-toggle" data-action="toggle-country" data-country-key="${escapeHtml(countryKey)}" aria-expanded="${String(countryOpen)}">`;
      html += `<span class="country-title"><span class="country-chevron">▸</span><span class="country-name">${escapeHtml(country)}</span></span>`;
      html += `<span class="country-count">${universities.length} univ.</span>`;
      html += `</button>`;
      html += `<div class="country-body${countryOpen ? '' : ' is-collapsed'}">`;
      html += `<div class="table-wrap"><table><colgroup><col style="width:${100 - pctPeriod * visiblePeriods.length}%">`;
      visiblePeriods.forEach(() => {
        html += `<col style="width:${pctPeriod}%">`;
      });
      html += `</colgroup><thead><tr class="country-head-row" role="button" tabindex="0" data-action="toggle-country" data-country-key="${escapeHtml(countryKey)}"><th><span class="country-head-cell"><span class="country-head-chevron">▸</span><span class="country-head-name">${escapeHtml(country)}</span><span class="country-head-meta">${universities.length} univ.</span></span></th>`;
      visiblePeriods.forEach(period => {
        html += `<th>${escapeHtml(PERIOD_LABELS[period])}</th>`;
      });
      html += `</tr></thead><tbody>`;

      universities.forEach(university => {
        const favorite = isFavorite(university);
        const favoriteLabel = favorite ? 'Retirer des favoris' : 'Ajouter aux favoris';
        html += `<tr><td><div class="uni-cell">`;
        html += `<button type="button" class="favorite-btn${favorite ? ' is-favorite' : ''}" data-action="toggle-favorite" data-favorite-id="${university.id}" aria-pressed="${String(favorite)}" title="${favoriteLabel}">★</button>`;
        html += `<span class="uni-name" title="${escapeHtml(university.u)}">${escapeHtml(university.u)}</span>`;
        html += `</div></td>`;
        visiblePeriods.forEach(period => {
          html += `<td>${badge(university[period])}</td>`;
        });
        html += `</tr>`;
      });

      html += `</tbody></table></div></div></section>`;
    });

    html += `</div></section>`;
  });

  main.innerHTML = html;
}

forEachNode(document.querySelectorAll('.filter-menu'), menu => {
  menu.addEventListener('toggle', () => {
    if (menu.open) closeFilterMenus(menu);
  });
});

document.getElementById('filters').addEventListener('change', event => {
  if (matchesSelector(event.target, '[data-filter-option]')) {
    const filterKey = event.target.dataset.filter;
    const selectedValues = uiState.filters[filterKey];
    if (event.target.checked) selectedValues.add(event.target.value);
    else selectedValues.delete(event.target.value);
    renderFilterControls();
    render();
    return;
  }

  if (event.target.id === 'fFavorites') {
    uiState.filters.favoritesOnly = event.target.checked;
    saveFilters();
    render();
  }
});

document.getElementById('filters').addEventListener('click', event => {
  const actionTarget = closestSelector(event.target, '[data-action]');
  if (!actionTarget) return;

  const filterKey = actionTarget.dataset.filter;
  if (actionTarget.dataset.action === 'select-all-filter') {
    uiState.filters[filterKey].clear();
    FILTER_MENU_CONFIG[filterKey].getOptions().forEach(option => uiState.filters[filterKey].add(option.value));
    renderFilterControls();
    render();
    return;
  }

  if (actionTarget.dataset.action === 'clear-filter') {
    uiState.filters[filterKey].clear();
    renderFilterControls();
    render();
  }
});

document.getElementById('fSearch').addEventListener('input', event => {
  uiState.filters.search = event.target.value;
  saveFilters();
  render();
});

document.getElementById('activeFilters').addEventListener('click', event => {
  const actionTarget = closestSelector(event.target, '[data-action="remove-filter-chip"]');
  if (!actionTarget) return;

  if (actionTarget.dataset.chipKind === 'search') {
    uiState.filters.search = '';
  } else if (actionTarget.dataset.chipKind === 'favorites') {
    uiState.filters.favoritesOnly = false;
  } else if (actionTarget.dataset.chipKind === 'set') {
    uiState.filters[actionTarget.dataset.filter].delete(actionTarget.dataset.value);
  }

  renderFilterControls();
  render();
});

document.getElementById('resetFilters').addEventListener('click', resetFilters);
document.getElementById('themeToggle').addEventListener('change', event => {
  applyTheme(event.target.checked ? 'light' : 'dark');
});
document.getElementById('toolbarToggle').addEventListener('click', () => toggleToolbar());
document.addEventListener('click', event => {
  if (!closestSelector(event.target, '.filter-menu')) closeFilterMenus();
});
document.addEventListener('keydown', event => {
  if (event.key === 'Escape') closeFilterMenus();
});
document.getElementById('main').addEventListener('click', event => {
  const actionTarget = closestSelector(event.target, '[data-action]');
  if (!actionTarget) return;

  if (actionTarget.dataset.action === 'toggle-continent') {
    toggleSection(uiState.continentOpen, actionTarget.dataset.continent);
    render();
    return;
  }

  if (actionTarget.dataset.action === 'toggle-country') {
    toggleSection(uiState.countryOpen, actionTarget.dataset.countryKey);
    render();
    return;
  }

  if (actionTarget.dataset.action === 'toggle-favorite') {
    toggleFavorite(actionTarget.dataset.favoriteId);
  }
});

document.getElementById('main').addEventListener('keydown', event => {
  const actionTarget = closestSelector(event.target, '.country-head-row[data-action="toggle-country"]');
  if (!actionTarget) return;
  if (event.key !== 'Enter' && event.key !== ' ') return;
  event.preventDefault();
  toggleSection(uiState.countryOpen, actionTarget.dataset.countryKey);
  render();
});

applyTheme(uiState.theme);
renderFilterControls();
render();
toggleToolbar(true);
</script>
